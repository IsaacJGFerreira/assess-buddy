  )
}

mutation MarcarDigitalizacaoComErro(
  $id: UUID!
) @auth(level: USER) @transaction {
  digitalizacaoFolha_update(
    first: {
      where: {
        id: { eq: $id }
        ownerUid: { eq_expr: "auth.uid" }
      }
    }
    data: {
      status: ERRO
      updatedAt_expr: "request.time"
    }
  ) @check(
    expr: "this != null"
    message: "Digitalização não encontrada."
  )
}

mutation ExcluirDigitalizacaoFolha(
  $id: UUID!
) @auth(level: USER) @transaction {
  digitalizacaoFolha_delete(
    first: {
      where: {
        id: { eq: $id }
        ownerUid: { eq_expr: "auth.uid" }
      }
    }
  ) @check(
    expr: "this != null"
    message: "Digitalização não encontrada."
  )
}
