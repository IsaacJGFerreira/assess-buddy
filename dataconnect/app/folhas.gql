mutation CriarFolhaRespostaComAluno(
  $avaliacaoId: UUID!
  $modeloId: UUID!
  $turmaId: UUID!
  $alunoId: UUID!
  $codigo: String!
  $qrPayload: String!
) @auth(level: USER) @transaction {
  query @redact {
    avaliacoes(
      where: {
        id: { eq: $avaliacaoId }
        turmaId: { eq: $turmaId }
        ownerUid: { eq_expr: "auth.uid" }
      }
      limit: 1
    ) @check(
      expr: "this.size() == 1"
      message: "Avaliação não encontrada ou não vinculada à turma."
    ) {
      id
    }

    modelosFolhaResposta(
      where: {
        id: { eq: $modeloId }
        avaliacaoId: { eq: $avaliacaoId }
        ownerUid: { eq_expr: "auth.uid" }
      }
      limit: 1
    ) @check(
      expr: "this.size() == 1"
      message: "Modelo não pertence à avaliação."
    ) {
      id
    }

    alunos(
      where: {
        id: { eq: $alunoId }
        turmaId: { eq: $turmaId }
        ownerUid: { eq_expr: "auth.uid" }
      }
      limit: 1
    ) @check(
      expr: "this.size() == 1"
      message: "Aluno não pertence à turma da avaliação."
    ) {
      id
    }
  }

  folhaResposta_insert(
    data: {
      ownerUid_expr: "auth.uid"
      avaliacaoId: $avaliacaoId
      modeloId: $modeloId
      alunoId: $alunoId
      codigo: $codigo
      qrPayload: $qrPayload
    }
  )
}

