query ListarMeusModelosFolha(
  $avaliacaoId: UUID!
) @auth(level: USER) {
  modelosFolhaResposta(
    where: {
      avaliacaoId: { eq: $avaliacaoId }
      ownerUid: { eq_expr: "auth.uid" }
    }
    orderBy: [{ versao: DESC }]
  ) {
    id
    avaliacaoId
    versao
    colunas
    linhasPorColuna
    orientacao
    snapshot
    createdAt
  }
}

query ObterMeuModeloFolha(
  $id: UUID!
) @auth(level: USER) {
  modelosFolhaResposta(
    where: {
      id: { eq: $id }
      ownerUid: { eq_expr: "auth.uid" }
    }
    limit: 1
  ) {
    id
    avaliacaoId
    versao
    colunas
    linhasPorColuna
    orientacao
    snapshot
    createdAt
  }
}

mutation CriarModeloFolha(
  $avaliacaoId: UUID!
  $versao: Int!
  $colunas: Int!
  $linhasPorColuna: Int!
  $orientacao: OrientacaoFolha!
  $snapshot: Any!
) @auth(level: USER) @transaction {
  query @redact {
    avaliacoes(
      where: {
        id: { eq: $avaliacaoId }
        ownerUid: { eq_expr: "auth.uid" }
      }
      limit: 1
    ) @check(
      expr: "this.size() == 1"
      message: "Avaliação não encontrada."
    ) {
      id
    }
  }

  modeloFolhaResposta_insert(
    data: {
      ownerUid_expr: "auth.uid"
      avaliacaoId: $avaliacaoId
      versao: $versao
      colunas: $colunas
      linhasPorColuna: $linhasPorColuna
      orientacao: $orientacao
      snapshot: $snapshot
    }
  )
}

